<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Расстояние до Луны</title>
</head>
<body style="background:black;color:white;text-align:center;padding-top:100px">

<h1>🌙 Реальное расстояние до Луны</h1>
<div id="distance" style="font-size:50px">Загрузка...</div>

<script>
async function load() {
  const res = await fetch("/api/moon");
  const data = await res.json();

  document.getElementById("distance").innerText =
    Number(data.distance).toLocaleString() + " км";
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
